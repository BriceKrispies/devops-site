<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trace — DevOps Portal</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="app-layout">

    <!-- ── Top bar ── -->
    <header class="topbar">
      <span class="topbar-brand">DevOps Portal</span>
      <span class="topbar-env">production</span>
    </header>

    <!-- ── Sidebar ── -->
    <nav class="sidebar">
      <div class="nav-section">Overview</div>
      <a class="nav-item" href="../../">Dashboard</a>
      <div class="nav-section">Investigate</div>
      <a class="nav-item active" href="./trace.html">Trace</a>
    </nav>

    <!-- ── Main content ── -->
    <main class="main-content trace-view">

      <!-- Search bar -->
      <form class="trace-search" id="trace-search-form">
        <input
          type="text"
          class="trace-search-input"
          id="trace-query"
          placeholder="Search by ticket, PR, service, commit, correlationId..."
          autocomplete="off"
          spellcheck="false"
        />
      </form>

      <!-- Prompt shown before first search -->
      <div class="trace-prompt" id="trace-prompt">
        <p>Enter a ticket, PR number, service name, or commit hash to trace events across systems.</p>
        <p class="trace-prompt-hint">Try: OPS-1234, api-gateway, 891, a3f8c21</p>
      </div>

      <!-- Timeline results region -->
      <section data-region="trace.results" data-state="loading" id="trace-results">
        <div class="region-loading trace-results-loading" style="display:none">
          <ol class="trace-timeline">
            <li class="trace-entry trace-skel"><span class="skeleton skel-cell skel-w-md"></span><span class="skeleton skel-cell skel-w-sm"></span><span class="skeleton skel-cell skel-w-lg"></span><span class="skeleton skel-name"></span></li>
            <li class="trace-entry trace-skel"><span class="skeleton skel-cell skel-w-md"></span><span class="skeleton skel-cell skel-w-sm"></span><span class="skeleton skel-cell skel-w-lg"></span><span class="skeleton skel-name"></span></li>
            <li class="trace-entry trace-skel"><span class="skeleton skel-cell skel-w-md"></span><span class="skeleton skel-cell skel-w-sm"></span><span class="skeleton skel-cell skel-w-lg"></span><span class="skeleton skel-name"></span></li>
            <li class="trace-entry trace-skel"><span class="skeleton skel-cell skel-w-md"></span><span class="skeleton skel-cell skel-w-sm"></span><span class="skeleton skel-cell skel-w-lg"></span><span class="skeleton skel-name"></span></li>
            <li class="trace-entry trace-skel"><span class="skeleton skel-cell skel-w-md"></span><span class="skeleton skel-cell skel-w-sm"></span><span class="skeleton skel-cell skel-w-lg"></span><span class="skeleton skel-name"></span></li>
            <li class="trace-entry trace-skel"><span class="skeleton skel-cell skel-w-md"></span><span class="skeleton skel-cell skel-w-sm"></span><span class="skeleton skel-cell skel-w-lg"></span><span class="skeleton skel-name"></span></li>
          </ol>
        </div>
        <div class="region-content"></div>
      </section>

    </main>
  </div>

  <script type="module" src="/src/ui/entries/trace.ts"></script>
</body>
</html>
