<body>
  <div class="app-layout">
<!-- include: topbar -->
<!-- include: sidebar -->

    <!-- ── Main content ── -->
    <main class="main-content">
      <div class="dashboard-grid">

        <!-- Region: Service Health -->
        <section class="region-card" data-region="services.health" data-state="loading">
          <div class="region-card-header">
            <h2>Service Health</h2>
          </div>
          <div class="region-card-body">
            <div class="region-loading">
              <ul class="service-list">
                <li class="service-item"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-meta"></span></li>
                <li class="service-item"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-meta"></span></li>

              </ul>
            </div>
            <div class="region-content"></div>
          </div>
        </section>

        <!-- Region: Recent Deployments -->
        <section class="region-card" data-region="deployments.recent" data-state="loading">
          <div class="region-card-header">
            <h2>Recent Deployments</h2>
          </div>
          <div class="region-card-body">
            <div class="region-loading">
              <table class="deploy-table">
                <thead>
                  <tr>
                    <th>Service</th>
                    <th>Env</th>
                    <th>Status</th>
                    <th>Commit</th>
                    <th>When</th>
                  </tr>
                </thead>
                <tbody>
                  <tr><td data-label="Service"><span class="skeleton skel-cell skel-w-lg"></span></td><td data-label="Env"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Status"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Commit"><span class="skeleton skel-cell skel-w-md"></span></td><td data-label="When"><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                  <tr><td data-label="Service"><span class="skeleton skel-cell skel-w-lg"></span></td><td data-label="Env"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Status"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Commit"><span class="skeleton skel-cell skel-w-md"></span></td><td data-label="When"><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                  <tr><td data-label="Service"><span class="skeleton skel-cell skel-w-lg"></span></td><td data-label="Env"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Status"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Commit"><span class="skeleton skel-cell skel-w-md"></span></td><td data-label="When"><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                  <tr><td data-label="Service"><span class="skeleton skel-cell skel-w-lg"></span></td><td data-label="Env"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Status"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Commit"><span class="skeleton skel-cell skel-w-md"></span></td><td data-label="When"><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                  <tr><td data-label="Service"><span class="skeleton skel-cell skel-w-lg"></span></td><td data-label="Env"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Status"><span class="skeleton skel-cell skel-w-sm"></span></td><td data-label="Commit"><span class="skeleton skel-cell skel-w-md"></span></td><td data-label="When"><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                </tbody>
              </table>
            </div>
            <div class="region-content"></div>
          </div>
        </section>

        <!-- Region: Active Jobs -->
        <section class="region-card" data-region="jobs.active" data-state="loading">
          <div class="region-card-header">
            <h2>Active Jobs</h2>
          </div>
          <div class="region-card-body">
            <div class="region-loading">
              <ul class="job-list">
                <li class="job-item"><div class="job-header"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-cell skel-w-sm"></span></div><div class="job-meta"><span class="skeleton skel-meta"></span></div></li>
                <li class="job-item"><div class="job-header"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-cell skel-w-sm"></span></div><div class="job-meta"><span class="skeleton skel-meta"></span></div></li>

              </ul>
            </div>
            <div class="region-content"></div>
          </div>
        </section>

      </div>

  <script type="module" src="/src/ui/entries/index.ts"></script>
