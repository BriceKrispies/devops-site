<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Portal</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="app-layout">

    <!-- ── Top bar ── -->
    <header class="topbar">
      <span class="topbar-brand">DevOps Portal</span>
      <span class="topbar-env">production</span>
    </header>

    <!-- ── Sidebar ── -->
    <nav class="sidebar">
      <div class="nav-section">Overview</div>
      <a class="nav-item active" href="/">Dashboard</a>
      <div class="nav-section">Investigate</div>
      <a class="nav-item" href="/src/pages/trace.html">Trace</a>
    </nav>

    <!-- ── Main content ── -->
    <main class="main-content">
      <div class="dashboard-grid">

        <!-- Region: Service Health -->
        <section class="region-card" data-region="services.health" data-state="loading">
          <div class="region-card-header">
            <h2>Service Health</h2>
          </div>
          <div class="region-card-body">
            <div class="region-loading">
              <ul class="service-list">
                <li class="service-item"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-meta"></span></li>
                <li class="service-item"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-meta"></span></li>
                <li class="service-item"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-meta"></span></li>
                <li class="service-item"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-meta"></span></li>
                <li class="service-item"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-meta"></span></li>
              </ul>
            </div>
            <div class="region-content"></div>
          </div>
        </section>

        <!-- Region: Recent Deployments -->
        <section class="region-card" data-region="deployments.recent" data-state="loading">
          <div class="region-card-header">
            <h2>Recent Deployments</h2>
          </div>
          <div class="region-card-body">
            <div class="region-loading">
              <table class="deploy-table">
                <thead>
                  <tr>
                    <th>Service</th>
                    <th>Env</th>
                    <th>Status</th>
                    <th>Commit</th>
                    <th>When</th>
                  </tr>
                </thead>
                <tbody>
                  <tr><td><span class="skeleton skel-cell skel-w-lg"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-md"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                  <tr><td><span class="skeleton skel-cell skel-w-lg"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-md"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                  <tr><td><span class="skeleton skel-cell skel-w-lg"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-md"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                  <tr><td><span class="skeleton skel-cell skel-w-lg"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-md"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                  <tr><td><span class="skeleton skel-cell skel-w-lg"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td><td><span class="skeleton skel-cell skel-w-md"></span></td><td><span class="skeleton skel-cell skel-w-sm"></span></td></tr>
                </tbody>
              </table>
            </div>
            <div class="region-content"></div>
          </div>
        </section>

        <!-- Region: Active Jobs -->
        <section class="region-card" data-region="jobs.active" data-state="loading">
          <div class="region-card-header">
            <h2>Active Jobs</h2>
          </div>
          <div class="region-card-body">
            <div class="region-loading">
              <ul class="job-list">
                <li class="job-item"><div class="job-header"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-cell skel-w-sm"></span></div><div class="job-meta"><span class="skeleton skel-meta"></span></div></li>
                <li class="job-item"><div class="job-header"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-cell skel-w-sm"></span></div><div class="job-meta"><span class="skeleton skel-meta"></span></div></li>
                <li class="job-item"><div class="job-header"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-cell skel-w-sm"></span></div><div class="job-meta"><span class="skeleton skel-meta"></span></div></li>
                <li class="job-item"><div class="job-header"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-cell skel-w-sm"></span></div><div class="job-meta"><span class="skeleton skel-meta"></span></div></li>
                <li class="job-item"><div class="job-header"><span class="skeleton skel-dot"></span><span class="skeleton skel-name"></span><span class="skeleton skel-cell skel-w-sm"></span></div><div class="job-meta"><span class="skeleton skel-meta"></span></div></li>
              </ul>
            </div>
            <div class="region-content"></div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <script type="module" src="/src/ui/entries/index.ts"></script>
</body>
</html>
